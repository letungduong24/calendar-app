version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: calendar-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123456}
      POSTGRES_DB: calendar
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - calendar-network

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: calendar-backend
    restart: always
    depends_on:
      - db
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-123456}@db:5432/calendar
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-me-in-production}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GOOGLE_CALLBACK_URL=${GOOGLE_CALLBACK_URL}
    networks:
      - calendar-network

networks:
  calendar-network:
    driver: bridge

volumes:
  postgres_data:
